<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dixit Score Counter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* PALETA DE CORES E FONTES MODERNAS */
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            background-color: var(--bg); 
            color: var(--text-main);
            max-width: 600px; 
            margin: auto; 
        }

        h1 { 
            text-align: center; 
            font-size: 26px; 
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        h2 { font-size: 20px; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-top: 0; }
        h3 { font-size: 16px; color: var(--text-muted); margin-bottom: 10px; }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            margin-bottom: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .config-row label { margin: 0; font-weight: 600; font-size: 15px; }
        
        .config-row input { 
            width: 70px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1;
            color: var(--primary);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: var(--text-main); }
        .form-group input[type="text"], .form-group select { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 16px;
            background-color: #fff;
            transition: border-color 0.2s;
            text-transform: uppercase; /* Força maiúscula na visualização da digitação */
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            border: none; 
            border-radius: 12px; 
            background-color: var(--primary); 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-top: 8px; 
        }
        
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #d1d5db !important; color: #9ca3af !important; cursor: not-allowed; transform: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn-group button { margin-top: 0; }
        
        .voice-btn { background-color: var(--success); }
        .start-btn { background-color: var(--text-main); margin-top: 24px; }
        #endGameBtn { background-color: var(--danger); margin-top: 24px; font-size: 18px; }

        ul { list-style-type: none; padding: 0; margin: 0; }
        li { 
            padding: 12px 16px; 
            background: #f8fafc; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 500;
            border: 1px solid var(--border);
        }
        
        .edit-btn { 
            background: #e2e8f0; 
            color: var(--text-main); 
            width: 36px; 
            height: 36px; 
            padding: 0; 
            margin: 0; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px;
        }

        /* ESTRUTURA PARA EVITAR QUEBRA DE LINHA */
        .narrator-badge, .winner-badge {
            padding: 20px 10px; /* Reduzi o padding lateral para caber mais texto */
            font-size: 28px; /* Ajuste para caber nomes na tela mobile */
            font-weight: 900;
            text-align: center;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            
            /* REGRAS ANTI-QUEBRA DE LINHA */
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .narrator-badge {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #fff;
            border: 3px solid #e0a800;
        }
        
        .narrator-small-badge {
            background-color: #fffbeb;
            color: #b45309;
            padding: 12px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 24px;
            border: 2px dashed #fcd34d;
            
            /* REGRAS ANTI-QUEBRA DE LINHA */
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .winner-badge {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: #fff;
            border: 3px solid #059669;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .trophy-icon {
            font-size: 48px;
            margin-bottom: 5px;
        }

        .vote-log { margin-top: 24px; }
        .vote-log li { background-color: #fff; font-size: 14px; }
    </style>
</head>
<body>

<h1>Dixit Score Counter 🎲</h1>

<div id="registrationCard" class="card">
    <h2>Configuração</h2>
    
    <div class="config-row">
        <label for="targetScore">Meta de Pontos:</label>
        <input type="number" id="targetScore" value="30" min="1">
    </div>

    <h2>Jogadores</h2>
    <div class="form-group">
        <input type="text" id="playerName" placeholder="EX: MAURO, GABRIEL, MICHELE...">
    </div>
    
    <div class="btn-group">
        <button onclick="adicionarJogador()">Adicionar</button>
        <button id="voiceBtn" class="voice-btn" onclick="iniciarVoz()">🎤 Falar</button>
    </div>

    <div style="margin-top: 24px;">
        <ul id="playerList"></ul>
    </div>

    <button class="start-btn" onclick="iniciarJogo()">Iniciar Partida</button>
</div>

<div id="roundIntroCard" class="card" style="display:none;">
    <h2 style="text-align: center; border: none;">Rodada <span id="roundNumberDisplay"></span></h2>
    <p style="text-align: center; font-size: 16px; color: var(--text-muted); margin-bottom: 5px;">O narrador da vez é:</p>
    
    <div id="storytellerHighlight" class="narrator-badge"></div>
    
    <button class="start-btn" onclick="iniciarVotacao()">Iniciar Votação</button>
</div>

<div id="votingCard" class="card" style="display:none;">
    <h2 style="margin-bottom: 20px;">Votação</h2>
    
    <div class="narrator-small-badge">
        NARRADOR: <span id="storytellerDisplay"></span>
    </div>
    
    <div class="form-group">
        <label for="voterSelect">Quem está votando?</label>
        <select id="voterSelect" onchange="atualizarOpcoesCartas()"></select>
    </div>
    <div class="form-group">
        <label for="cardOwnerSelect">Escolheu a carta de quem?</label>
        <select id="cardOwnerSelect"></select>
    </div>
    
    <button id="registerVoteBtn" onclick="registrarVoto()">Registrar Voto</button>
    
    <div class="vote-log" id="voteLogContainer">
        <h3>Registros:</h3>
        <ul id="voteLogList"></ul>
    </div>
    
    <button id="endGameBtn" style="display:none;" onclick="finalizarRodada()">Encerrar Rodada</button>
</div>

<div id="roundResultsCard" class="card" style="display:none;">
    <h2>Placar da Rodada</h2>
    <ul id="currentScoresList" style="margin-top: 20px; margin-bottom: 24px;"></ul>
    <button class="start-btn" onclick="proximaRodada()">Próxima Rodada</button>
</div>

<div id="finalResultsCard" class="card" style="display:none;">
    <h2 style="text-align: center; border: none; font-size: 24px;">Fim de Jogo!</h2>
    
    <div id="winnerDisplay" class="winner-badge"></div>
    
    <h3 style="margin-top: 24px;">Placar Final:</h3>
    <ul id="finalScoresList" style="margin-bottom: 24px;"></ul>
    <button class="start-btn" onclick="location.reload()">Jogar Novamente</button>
</div>

<script>
    let players = {};
    let playerNames = []; 
    let playOrder = []; 
    let storytellerIndex = 0;
    let storyteller = "";
    let votes = {};
    let roundNumber = 1;
    let winningScoreTarget = 30;

    function adicionarJogador() {
        const nameInput = document.getElementById('playerName');
        // Pega o nome, remove espaços nas bordas e FORÇA MAIÚSCULO
        const name = nameInput.value.trim().toUpperCase(); 
        
        if (name && !players[name]) {
            players[name] = 0;
            playerNames.push(name);
            nameInput.value = "";
            atualizarListaJogadores();
        }
    }

    function iniciarVoz() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert("Seu navegador não suporta reconhecimento de voz.");
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
            document.getElementById('voiceBtn').textContent = "🎤 Ouvindo...";
            document.getElementById('voiceBtn').style.opacity = "0.8";
        };

        recognition.onresult = function(event) {
            let text = event.results[0][0].transcript;
            // Remove pontuação, espaços e FORÇA MAIÚSCULO
            text = text.replace(/[.?!]/g, "").trim().toUpperCase(); 
            if (text) {
                document.getElementById('playerName').value = text;
                adicionarJogador();
            }
        };

        recognition.onend = function() {
            document.getElementById('voiceBtn').textContent = "🎤 Falar";
            document.getElementById('voiceBtn').style.opacity = "1";
        };

        recognition.start();
    }

    function atualizarListaJogadores() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        playerNames.forEach(name => {
            const li = document.createElement('li');
            li.textContent = name;

            const editBtn = document.createElement('button');
            editBtn.innerHTML = '✏️'; 
            editBtn.className = 'edit-btn';
            editBtn.onclick = () => editarNome(name);
            li.appendChild(editBtn);

            list.appendChild(li);
        });
    }

    function editarNome(oldName) {
        let newName = prompt(`Digite o novo nome para ${oldName}:`, oldName);
        if (newName && newName.trim() !== "") {
            const cleanNewName = newName.trim().toUpperCase(); // Força maiúsculo na edição
            
            if (cleanNewName !== oldName && players[cleanNewName]) {
                alert("Já existe um jogador com esse nome!");
                return;
            }
            
            players[cleanNewName] = players[oldName];
            if (cleanNewName !== oldName) {
                delete players[oldName];
            }
            
            const index = playerNames.indexOf(oldName);
            if (index !== -1) {
                playerNames[index] = cleanNewName;
            }
            atualizarListaJogadores();
        }
    }

    function esconderTodasTelas() {
        document.getElementById('registrationCard').style.display = "none";
        document.getElementById('roundIntroCard').style.display = "none";
        document.getElementById('votingCard').style.display = "none";
        document.getElementById('roundResultsCard').style.display = "none";
        document.getElementById('finalResultsCard').style.display = "none";
    }

    function iniciarJogo() {
        if (playerNames.length < 3) {
            alert("Você precisa de pelo menos 3 jogadores.");
            return;
        }
        
        const targetInput = document.getElementById('targetScore').value;
        winningScoreTarget = parseInt(targetInput) || 30;
        
        playOrder = [...playerNames];
        for (let i = playOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
        }
        
        storytellerIndex = 0; 
        mostrarTelaNarrador();
    }

    function mostrarTelaNarrador() {
        esconderTodasTelas();
        storyteller = playOrder[storytellerIndex];
        document.getElementById('roundNumberDisplay').textContent = roundNumber;
        document.getElementById('storytellerHighlight').textContent = storyteller;
        document.getElementById('roundIntroCard').style.display = "block";
    }

    function iniciarVotacao() {
        esconderTodasTelas();
        votes = {}; 
        document.getElementById('storytellerDisplay').textContent = storyteller;
        document.getElementById('voteLogList').innerHTML = ""; 
        popularSelects();
        verificarEstadoVotacao(); 
        document.getElementById('votingCard').style.display = "block";
    }

    function popularSelects() {
        const voterSelect = document.getElementById('voterSelect');
        voterSelect.innerHTML = "";

        playerNames.forEach(name => {
            if (name !== storyteller) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                voterSelect.appendChild(opt);
            }
        });
        
        atualizarOpcoesCartas();
    }

    function atualizarOpcoesCartas() {
        const voterSelect = document.getElementById('voterSelect');
        const cardOwnerSelect = document.getElementById('cardOwnerSelect');
        
        const selectedVoter = voterSelect.value;
        const currentCardSelection = cardOwnerSelect.value; 

        cardOwnerSelect.innerHTML = "";

        playerNames.forEach(name => {
            if (name !== selectedVoter) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                cardOwnerSelect.appendChild(opt);
            }
        });

        if (currentCardSelection && currentCardSelection !== selectedVoter && playerNames.includes(currentCardSelection)) {
            cardOwnerSelect.value = currentCardSelection;
        }
    }

    function verificarEstadoVotacao() {
        const totalVoters = playerNames.length - 1;
        let totalVotesCast = 0;
        for (let key in votes) {
            totalVotesCast += votes[key].length;
        }

        const registerBtn = document.getElementById('registerVoteBtn');
        const endRoundBtn = document.getElementById('endGameBtn');
        const selectElement1 = document.getElementById('voterSelect');
        const selectElement2 = document.getElementById('cardOwnerSelect');

        if (totalVotesCast >= totalVoters) {
            registerBtn.disabled = true;
            registerBtn.textContent = "TODOS VOTARAM!";
            endRoundBtn.style.display = "block"; 
            selectElement1.disabled = true;
            selectElement2.disabled = true;
        } else {
            registerBtn.disabled = false;
            registerBtn.textContent = "Registrar Voto";
            endRoundBtn.style.display = "none"; 
            selectElement1.disabled = false;
            selectElement2.disabled = false;
        }
    }

    function registrarVoto() {
        const voter = document.getElementById('voterSelect').value;
        const cardOwner = document.getElementById('cardOwnerSelect').value;
        
        if (!votes[cardOwner]) {
            votes[cardOwner] = [];
        }
        
        for (let key in votes) {
            votes[key] = votes[key].filter(v => v !== voter);
        }

        votes[cardOwner].push(voter);
        atualizarLogVotos();
        avancarParaProximoEleitor();
        verificarEstadoVotacao(); 
    }

    function corrigirVoto(voter, owner) {
        votes[owner] = votes[owner].filter(v => v !== voter);
        atualizarLogVotos();
        
        const voterSelect = document.getElementById('voterSelect');
        voterSelect.value = voter;
        atualizarOpcoesCartas();
        verificarEstadoVotacao(); 
    }

    function avancarParaProximoEleitor() {
        const allVoters = playerNames.filter(n => n !== storyteller);
        const votersWhoVoted = [];
        for (let key in votes) {
            votersWhoVoted.push(...votes[key]);
        }
        
        const nextVoter = allVoters.find(v => !votersWhoVoted.includes(v));
        
        if (nextVoter) {
            document.getElementById('voterSelect').value = nextVoter;
            atualizarOpcoesCartas(); 
        }
    }

    function atualizarLogVotos() {
        const logList = document.getElementById('voteLogList');
        logList.innerHTML = "";
        for (let owner in votes) {
            votes[owner].forEach(voter => {
                const li = document.createElement('li');
                
                const spanTexto = document.createElement('span');
                spanTexto.textContent = `${voter} ➔ ${owner}`;
                li.appendChild(spanTexto);

                const editBtn = document.createElement('button');
                editBtn.innerHTML = '✏️'; 
                editBtn.className = 'edit-btn';
                editBtn.onclick = () => corrigirVoto(voter, owner);
                
                li.appendChild(editBtn);
                logList.appendChild(li);
            });
        }
    }

    function finalizarRodada() {
        const totalVoters = playerNames.length - 1;
        const storytellerVotes = votes[storyteller] ? votes[storyteller] : [];
        const storytellerVotesCount = storytellerVotes.length;
        
        if (storytellerVotesCount === 0 || storytellerVotesCount === totalVoters) {
            playerNames.forEach(name => {
                if (name !== storyteller) {
                    players[name] += 2;
                }
            });
        } 
        else {
            players[storyteller] += (3 + storytellerVotesCount);
            storytellerVotes.forEach(voter => {
                players[voter] += 3;
            });
        }

        for (let cardOwner in votes) {
            if (cardOwner !== storyteller) {
                players[cardOwner] += votes[cardOwner].length;
            }
        }
        
        let maxScore = 0;
        playerNames.forEach(name => {
            if (players[name] > maxScore) maxScore = players[name];
        });

        if (maxScore >= winningScoreTarget) {
            mostrarVencedor(); 
        } else {
            mostrarPlacarRodada(); 
        }
    }

    function mostrarPlacarRodada() {
        esconderTodasTelas();
        
        const resultsList = document.getElementById('currentScoresList');
        resultsList.innerHTML = "";
        
        let sortedPlayers = [...playerNames].sort((a, b) => players[b] - players[a]);

        sortedPlayers.forEach(name => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${name}</span> <strong>${players[name]} pts</strong>`;
            resultsList.appendChild(li);
        });

        document.getElementById('roundResultsCard').style.display = "block";
    }

    function proximaRodada() {
        roundNumber++;
        storytellerIndex = (storytellerIndex + 1) % playOrder.length;
        mostrarTelaNarrador();
    }

    // DISPARA O CONFETE E MOSTRA O RESULTADO
    function dispararConfete() {
        if (typeof confetti === "function") {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    }

    function mostrarVencedor() {
        esconderTodasTelas();
        
        let sortedPlayers = [...playerNames].sort((a, b) => players[b] - players[a]);
        let winnerScore = players[sortedPlayers[0]];
        let winners = sortedPlayers.filter(name => players[name] === winnerScore);
        
        const winnerDisplay = document.getElementById('winnerDisplay');
        
        // Estrutura do Troféu em cima do Nome para evitar quebra lateral
        let htmlConteudo = `<div class="trophy-icon">🏆</div>`;
        
        if (winners.length > 1) {
            htmlConteudo += `<div>EMPATE!</div><div style="font-size: 20px">${winners.join(" & ")}</div>`;
        } else {
            htmlConteudo += `<div>${winners[0]} VENCEU!</div>`;
        }
        
        winnerDisplay.innerHTML = htmlConteudo;

        const finalResultsList = document.getElementById('finalScoresList');
        finalResultsList.innerHTML = "";
        sortedPlayers.forEach(name => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${name}</span> <strong>${players[name]} pts</strong>`;
            finalResultsList.appendChild(li);
        });

        document.getElementById('finalResultsCard').style.display = "block";
        
        // Ativa o efeito do papelzinho voando!
        dispararConfete();
    }
</script>

</body>
</html>
