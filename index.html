<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dixit Score Counter</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; max-width: 600px; margin: auto; }
        h1 { color: #333; text-align: center; }
        .card { background: #fff; padding: 20px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 8px; background-color: #007bff; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; margin-top: 0; }
        .voice-btn { background-color: #28a745; }
        .voice-btn:hover { background-color: #218838; }
        .start-btn { background-color: #17a2b8; margin-top: 20px; }
        .start-btn:hover { background-color: #138496; }
        .next-btn { background-color: #ffc107; color: #333; }
        .next-btn:hover { background-color: #e0a800; }
        #endGameBtn { background-color: #dc3545; }
        #endGameBtn:hover { background-color: #bd2130; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; background: #e9ecef; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background: none; border: none; cursor: pointer; color: #007bff; font-size: 18px; margin-left: 10px; width: auto; padding: 0; margin-top: 0; display: inline; }
        .score-highlight { font-size: 24px; font-weight: bold; color: #007bff; text-align: center; margin: 20px 0; }
        .vote-log { font-size: 14px; color: #555; margin-top: 10px; }
        
        .narrator-badge {
            background-color: #ffc107;
            color: #000;
            padding: 20px;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 3px solid #e0a800;
        }
        .narrator-small-badge {
            background-color: #ffc107;
            color: #000;
            padding: 10px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<h1>Dixit Score Counter 🎲</h1>

<div id="registrationCard" class="card">
    <h2>1. Configuração da Partida</h2>
    
    <div class="form-group" style="background-color: #e9ecef; padding: 15px; border-radius: 8px; border-left: 5px solid #17a2b8;">
        <label for="targetScore">Pontuação Máxima (Meta para vencer):</label>
        <input type="number" id="targetScore" value="30" min="1" style="font-size: 18px; font-weight: bold;">
    </div>

    <h3>2. Cadastro de Jogadores</h3>
    <div class="form-group">
        <label for="playerName">Nome do Jogador:</label>
        <input type="text" id="playerName" placeholder="Ex: Mauro, Gabriel, Michele...">
    </div>
    
    <div class="btn-group">
        <button onclick="adicionarJogador()">Escrever Nome</button>
        <button id="voiceBtn" class="voice-btn" onclick="iniciarVoz()">🎤 Falar Nome</button>
    </div>

    <h3>Jogadores Cadastrados:</h3>
    <ul id="playerList"></ul>

    <button class="start-btn" onclick="iniciarJogo()">Iniciar Partida</button>
</div>

<div id="roundIntroCard" class="card" style="display:none;">
    <h2 style="text-align: center;">Rodada <span id="roundNumberDisplay"></span></h2>
    <p style="text-align: center; font-size: 18px; color: #555; margin-bottom: 5px;">O narrador da vez é:</p>
    
    <div id="storytellerHighlight" class="narrator-badge"></div>
    
    <button class="start-btn" onclick="iniciarVotacao()">Iniciar Votação</button>
</div>

<div id="votingCard" class="card" style="display:none;">
    <h2>Painel de Votação</h2>
    
    <div class="narrator-small-badge">
        Narrador: <span id="storytellerDisplay"></span>
    </div>
    
    <div class="form-group">
        <label for="voterSelect">Quem está votando?</label>
        <select id="voterSelect" onchange="atualizarOpcoesCartas()"></select>
    </div>
    <div class="form-group">
        <label for="cardOwnerSelect">Votou na carta de quem?</label>
        <select id="cardOwnerSelect"></select>
    </div>
    <button onclick="registrarVoto()">Registrar Voto</button>
    
    <div class="vote-log" id="voteLogContainer">
        <h4>Votos Registrados:</h4>
        <ul id="voteLogList"></ul>
    </div>
    
    <button id="endGameBtn" onclick="finalizarRodada()" style="margin-top: 20px;">Encerrar Rodada</button>
</div>

<div id="roundResultsCard" class="card" style="display:none;">
    <h2>Fim da Rodada!</h2>
    <h3>Placar Atualizado:</h3>
    <ul id="currentScoresList"></ul>
    <button id="nextRoundBtn" class="next-btn" onclick="proximaRodada()">Próxima Rodada</button>
</div>

<div id="finalResultsCard" class="card" style="display:none;">
    <h2 style="text-align: center; font-size: 28px;">Fim de Jogo! 🏆</h2>
    
    <div id="winnerDisplay" class="narrator-badge" style="background-color: #28a745; border-color: #218838; color: white;"></div>
    
    <h3>Placar Final:</h3>
    <ul id="finalScoresList"></ul>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<script>
    let players = {};
    let playerNames = []; 
    let playOrder = []; 
    let storytellerIndex = 0;
    let storyteller = "";
    let votes = {};
    let roundNumber = 1;
    let winningScoreTarget = 30; // Variável atualizada no início do jogo

    function adicionarJogador() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        if (name && !players[name]) {
            players[name] = 0;
            playerNames.push(name);
            nameInput.value = "";
            atualizarListaJogadores();
        }
    }

    function iniciarVoz() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert("Seu navegador não suporta reconhecimento de voz no momento. Por favor, digite o nome.");
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
            document.getElementById('voiceBtn').textContent = "🎤 Ouvindo...";
            document.getElementById('voiceBtn').style.backgroundColor = "#ffc107";
        };

        recognition.onresult = function(event) {
            let text = event.results[0][0].transcript;
            text = text.replace(/[.?!]/g, "").trim();
            if (text) {
                text = text.charAt(0).toUpperCase() + text.slice(1);
                document.getElementById('playerName').value = text;
                adicionarJogador();
            }
        };

        recognition.onend = function() {
            document.getElementById('voiceBtn').textContent = "🎤 Falar Nome";
            document.getElementById('voiceBtn').style.backgroundColor = "#28a745";
        };

        recognition.onerror = function(event) {
            console.error(event.error);
            alert("Não entendi muito bem. Tente falar novamente ou digite o nome.");
            document.getElementById('voiceBtn').textContent = "🎤 Falar Nome";
            document.getElementById('voiceBtn').style.backgroundColor = "#28a745";
        };

        recognition.start();
    }

    function atualizarListaJogadores() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        playerNames.forEach(name => {
            const li = document.createElement('li');
            const nameSpan = document.createElement('span');
            nameSpan.textContent = name;
            li.appendChild(nameSpan);

            const editBtn = document.createElement('button');
            editBtn.innerHTML = '✏️'; 
            editBtn.className = 'edit-btn';
            editBtn.onclick = () => editarNome(name);
            li.appendChild(editBtn);

            list.appendChild(li);
        });
    }

    function editarNome(oldName) {
        const newName = prompt(`Digite o novo nome para ${oldName}:`, oldName);
        if (newName && newName.trim() !== "" && newName !== oldName) {
            const cleanNewName = newName.trim();
            if (players[cleanNewName]) {
                alert("Já existe um jogador com esse nome!");
                return;
            }
            players[cleanNewName] = players[oldName];
            delete players[oldName];
            
            const index = playerNames.indexOf(oldName);
            if (index !== -1) {
                playerNames[index] = cleanNewName;
            }
            atualizarListaJogadores();
        }
    }

    function esconderTodasTelas() {
        document.getElementById('registrationCard').style.display = "none";
        document.getElementById('roundIntroCard').style.display = "none";
        document.getElementById('votingCard').style.display = "none";
        document.getElementById('roundResultsCard').style.display = "none";
        document.getElementById('finalResultsCard').style.display = "none";
    }

    function iniciarJogo() {
        if (playerNames.length < 3) {
            alert("Você precisa de pelo menos 3 jogadores para iniciar o Dixit.");
            return;
        }
        
        // Captura a pontuação máxima definida
        const targetInput = document.getElementById('targetScore').value;
        winningScoreTarget = parseInt(targetInput) || 30;
        
        playOrder = [...playerNames];
        for (let i = playOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
        }
        
        storytellerIndex = 0; 
        mostrarTelaNarrador();
    }

    function mostrarTelaNarrador() {
        esconderTodasTelas();
        storyteller = playOrder[storytellerIndex];
        document.getElementById('roundNumberDisplay').textContent = roundNumber;
        document.getElementById('storytellerHighlight').textContent = storyteller;
        document.getElementById('roundIntroCard').style.display = "block";
    }

    function iniciarVotacao() {
        esconderTodasTelas();
        votes = {}; 
        document.getElementById('storytellerDisplay').textContent = storyteller;
        document.getElementById('voteLogList').innerHTML = ""; 
        popularSelects();
        document.getElementById('votingCard').style.display = "block";
    }

    function popularSelects() {
        const voterSelect = document.getElementById('voterSelect');
        voterSelect.innerHTML = "";

        playerNames.forEach(name => {
            if (name !== storyteller) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                voterSelect.appendChild(opt);
            }
        });
        
        atualizarOpcoesCartas();
    }

    function atualizarOpcoesCartas() {
        const voterSelect = document.getElementById('voterSelect');
        const cardOwnerSelect = document.getElementById('cardOwnerSelect');
        
        const selectedVoter = voterSelect.value;
        const currentCardSelection = cardOwnerSelect.value; 

        cardOwnerSelect.innerHTML = "";

        playerNames.forEach(name => {
            if (name !== selectedVoter) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                cardOwnerSelect.appendChild(opt);
            }
        });

        if (currentCardSelection && currentCardSelection !== selectedVoter && playerNames.includes(currentCardSelection)) {
            cardOwnerSelect.value = currentCardSelection;
        }
    }

    function registrarVoto() {
        const voter = document.getElementById('voterSelect').value;
        const cardOwner = document.getElementById('cardOwnerSelect').value;
        
        if (!votes[cardOwner]) {
            votes[cardOwner] = [];
        }
        
        for (let key in votes) {
            votes[key] = votes[key].filter(v => v !== voter);
        }

        votes[cardOwner].push(voter);
        atualizarLogVotos();

        avancarParaProximoEleitor();
    }

    function corrigirVoto(voter, owner) {
        votes[owner] = votes[owner].filter(v => v !== voter);
        atualizarLogVotos();
        
        const voterSelect = document.getElementById('voterSelect');
        voterSelect.value = voter;
        atualizarOpcoesCartas();
    }

    function avancarParaProximoEleitor() {
        const allVoters = playerNames.filter(n => n !== storyteller);
        const votersWhoVoted = [];
        for (let key in votes) {
            votersWhoVoted.push(...votes[key]);
        }
        
        const nextVoter = allVoters.find(v => !votersWhoVoted.includes(v));
        
        if (nextVoter) {
            document.getElementById('voterSelect').value = nextVoter;
            atualizarOpcoesCartas(); 
        }
    }

    function atualizarLogVotos() {
        const logList = document.getElementById('voteLogList');
        logList.innerHTML = "";
        for (let owner in votes) {
            votes[owner].forEach(voter => {
                const li = document.createElement('li');
                
                const spanTexto = document.createElement('span');
                spanTexto.textContent = `${voter} votou na carta de ${owner}`;
                li.appendChild(spanTexto);

                const editBtn = document.createElement('button');
                editBtn.innerHTML = '✏️'; 
                editBtn.className = 'edit-btn';
                editBtn.title = 'Corrigir voto';
                editBtn.onclick = () => corrigirVoto(voter, owner);
                
                li.appendChild(editBtn);
                logList.appendChild(li);
            });
        }
    }

    function finalizarRodada() {
        const totalVoters = playerNames.length - 1;
        let totalVotesCast = 0;
        
        for (let key in votes) {
            totalVotesCast += votes[key].length;
        }

        if (totalVotesCast < totalVoters) {
            if(!confirm("Nem todos os jogadores registraram seus votos. Deseja encerrar a rodada mesmo assim?")) {
                return;
            }
        }

        const storytellerVotes = votes[storyteller] ? votes[storyteller] : [];
        const storytellerVotesCount = storytellerVotes.length;
        
        if (storytellerVotesCount === 0 || storytellerVotesCount === totalVoters) {
            playerNames.forEach(name => {
                if (name !== storyteller) {
                    players[name] += 2;
                }
            });
        } 
        else {
            players[storyteller] += (3 + storytellerVotesCount);
            
            storytellerVotes.forEach(voter => {
                players[voter] += 3;
            });
        }

        for (let cardOwner in votes) {
            if (cardOwner !== storyteller) {
                players[cardOwner] += votes[cardOwner].length;
            }
        }
        
        // Verifica se alguém atingiu a pontuação máxima
        let maxScore = 0;
        playerNames.forEach(name => {
            if (players[name] > maxScore) maxScore = players[name];
        });

        if (maxScore >= winningScoreTarget) {
            mostrarVencedor(); // Pula direto para a tela de vitória
        } else {
            mostrarPlacarRodada(); // Continua para a próxima rodada
        }
    }

    function mostrarPlacarRodada() {
        esconderTodasTelas();
        
        const resultsList = document.getElementById('currentScoresList');
        resultsList.innerHTML = "";
        
        let sortedPlayers = [...playerNames].sort((a, b) => players[b] - players[a]);

        sortedPlayers.forEach(name => {
            const li = document.createElement('li');
            li.textContent = `${name}: ${players[name]} pontos`;
            resultsList.appendChild(li);
        });

        document.getElementById('roundResultsCard').style.display = "block";
    }

    function proximaRodada() {
        roundNumber++;
        storytellerIndex = (storytellerIndex + 1) % playOrder.length;
        mostrarTelaNarrador();
    }

    function mostrarVencedor() {
        esconderTodasTelas();
        
        let sortedPlayers = [...playerNames].sort((a, b) => players[b] - players[a]);
        let winnerScore = players[sortedPlayers[0]];
        let winners = sortedPlayers.filter(name => players[name] === winnerScore);
        
        const winnerDisplay = document.getElementById('winnerDisplay');
        if (winners.length > 1) {
            winnerDisplay.textContent = `EMPATE!\n${winners.join(" e ")}`;
        } else {
            winnerDisplay.textContent = `🏆 ${winners[0]} VENCEU! 🏆`;
        }

        const finalResultsList = document.getElementById('finalScoresList');
        finalResultsList.innerHTML = "";
        sortedPlayers.forEach(name => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${name}</strong>: ${players[name]} pontos`;
            finalResultsList.appendChild(li);
        });

        document.getElementById('finalResultsCard').style.display = "block";
    }
</script>

</body>
</html>
