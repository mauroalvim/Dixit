<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dixit Score Counter v6</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4361ee; --bg: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; }
        body { font-family: sans-serif; padding: 15px; background-color: var(--bg); color: var(--text-main); max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); padding: 24px; margin-bottom: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .config-row { display: flex; align-items: center; justify-content: space-between; background-color: #f8fafc; padding: 12px 16px; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 24px; }
        .config-row input { width: 70px; text-align: center; font-size: 18px; font-weight: bold; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; color: var(--primary); }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 16px; text-transform: uppercase; }
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 12px; background-color: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-top: 8px; }
        button:disabled { background-color: #d1d5db !important; cursor: not-allowed; }
        .edit-btn { background: #e2e8f0; color: var(--text-main); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        
        /* Ajuste fino para nomes longos */
        .fit-container { white-space: nowrap; display: inline-block; transform-origin: center; transition: transform 0.1s; }
        .narrator-badge { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #fff; padding: 20px 10px; font-size: 32px; font-weight: 900; text-align: center; border-radius: 16px; margin: 20px 0; border: 3px solid #e0a800; overflow: hidden; }
        .winner-badge { background: linear-gradient(135deg, #10b981, #34d399); color: #fff; padding: 20px 10px; font-size: 28px; font-weight: 900; text-align: center; border-radius: 16px; margin: 20px 0; overflow: hidden; }
        .version-footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h1>Dixit Score Counter 🎲</h1>

<div id="registrationCard" class="card">
    <h2>Configuração</h2>
    <div class="config-row">
        <label>Meta de Pontos:</label>
        <input type="number" id="targetScore" value="30">
    </div>
    <h2>Jogadores</h2>
    <div class="form-group"><input type="text" id="playerName" placeholder="NOME DO JOGADOR"></div>
    <div style="display:flex; gap:10px;">
        <button onclick="adicionarJogador()">Adicionar</button>
        <button onclick="iniciarVoz()" style="background-color:#10b981;">🎤 Falar</button>
    </div>
    <ul id="playerList" style="margin-top:20px;"></ul>
    <button onclick="iniciarJogo()" style="background-color:black; margin-top:24px;">Iniciar Partida</button>
</div>

<div id="roundIntroCard" class="card" style="display:none;">
    <h2 style="text-align: center;">Rodada <span id="roundNumberDisplay"></span></h2>
    <div class="narrator-badge"><div id="storytellerText" class="fit-container"></div></div>
    <button onclick="iniciarVotacao()">Iniciar Votação</button>
</div>

<div id="votingCard" class="card" style="display:none;">
    <h2 style="margin-bottom: 20px;">Votação</h2>
    <div style="background:#fffbeb; padding:10px; border-radius:10px; text-align:center; font-weight:bold; margin-bottom:20px;">
        NARRADOR: <span id="storytellerDisplay"></span>
    </div>
    <div class="form-group"><label>Quem vota?</label><select id="voterSelect" onchange="atualizarOpcoesCartas()"></select></div>
    <div class="form-group"><label>Vota em quem?</label><select id="cardOwnerSelect"></select></div>
    <button id="registerVoteBtn" onclick="registrarVoto()">Registrar Voto</button>
    <ul id="voteLogList" style="margin-top:20px;"></ul>
    <button id="endGameBtn" style="display:none; background-color:red;" onclick="finalizarRodada()">Encerrar Rodada</button>
</div>

<div id="roundResultsCard" class="card" style="display:none;">
    <h2>Placar da Rodada</h2>
    <ul id="currentScoresList" style="margin-top:20px; margin-bottom:20px;"></ul>
    <button onclick="proximaRodada()">Próxima Rodada</button>
</div>

<div id="finalResultsCard" class="card" style="display:none;">
    <div id="winnerDisplay" class="winner-badge"></div>
    <ul id="finalScoresList" style="margin-bottom:20px;"></ul>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<div class="version-footer">Versão 6.0</div>

<script>
    let players = {}, playerNames = [], playOrder = [], storytellerIndex = 0, storyteller = "", votes = {}, roundNumber = 1, winningScoreTarget = 30;

    // Função para ajustar o nome sem quebrar a linha
    function ajustarNome(id) {
        const container = document.getElementById(id);
        if (!container) return;
        container.style.transform = 'scale(1)';
        const parentWidth = container.parentElement.clientWidth - 20;
        if (container.scrollWidth > parentWidth) {
            container.style.transform = `scale(${parentWidth / container.scrollWidth})`;
        }
    }

    function adicionarJogador() {
        const input = document.getElementById('playerName');
        const name = input.value.trim().toUpperCase();
        if (name && !players[name]) {
            players[name] = 0; playerNames.push(name); input.value = "";
            atualizarListaJogadores();
        }
    }

    function iniciarVoz() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        recognition.onresult = (e) => {
            document.getElementById('playerName').value = e.results[0][0].transcript.toUpperCase();
            adicionarJogador();
        };
        recognition.start();
    }

    function atualizarListaJogadores() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        playerNames.forEach(name => {
            const li = document.createElement('li');
            li.textContent = name;
            const btn = document.createElement('button');
            btn.innerHTML = '✏️'; btn.className = 'edit-btn';
            btn.onclick = () => editarNome(name);
            li.appendChild(btn);
            list.appendChild(li);
        });
    }

    function editarNome(oldName) {
        let newName = prompt(`Novo nome para ${oldName}:`, oldName);
        if (newName) {
            const clean = newName.toUpperCase();
            players[clean] = players[oldName];
            delete players[oldName];
            playerNames = playerNames.map(n => n === oldName ? clean : n);
            atualizarListaJogadores();
        }
    }

    function iniciarJogo() {
        if (playerNames.length < 3) return alert("Mínimo 3 jogadores.");
        winningScoreTarget = parseInt(document.getElementById('targetScore').value);
        playOrder = [...playerNames].sort(() => Math.random() - 0.5);
        storytellerIndex = 0;
        mostrarTelaNarrador();
    }

    function mostrarTelaNarrador() {
        esconderTodasTelas();
        storyteller = playOrder[storytellerIndex];
        document.getElementById('roundNumberDisplay').textContent = roundNumber;
        document.getElementById('storytellerText').textContent = storyteller;
        document.getElementById('roundIntroCard').style.display = "block";
        setTimeout(() => ajustarNome('storytellerText'), 100);
    }

    function iniciarVotacao() {
        esconderTodasTelas(); votes = {}; popularSelects(); verificarEstadoVotacao();
        document.getElementById('storytellerDisplay').textContent = storyteller;
        document.getElementById('votingCard').style.display = "block";
    }

    function popularSelects() {
        const vS = document.getElementById('voterSelect'); vS.innerHTML = "";
        playerNames.forEach(n => { if (n !== storyteller) vS.innerHTML += `<option value="${n}">${n}</option>`; });
        atualizarOpcoesCartas();
    }

    function atualizarOpcoesCartas() {
        const vS = document.getElementById('voterSelect'), cS = document.getElementById('cardOwnerSelect');
        cS.innerHTML = "";
        playerNames.forEach(n => { if (n !== vS.value) cS.innerHTML += `<option value="${n}">${n}</option>`; });
    }

    function registrarVoto() {
        const v = document.getElementById('voterSelect').value, o = document.getElementById('cardOwnerSelect').value;
        if (!votes[o]) votes[o] = [];
        for (let k in votes) votes[k] = votes[k].filter(x => x !== v);
        votes[o].push(v);
        atualizarLogVotos();
        verificarEstadoVotacao();
        avancarParaProximoEleitor();
    }

    function verificarEstadoVotacao() {
        const totalVoters = playerNames.length - 1, totalVoted = Object.values(votes).flat().length;
        document.getElementById('registerVoteBtn').disabled = totalVoted >= totalVoters;
        document.getElementById('endGameBtn').style.display = totalVoted >= totalVoters ? "block" : "none";
    }

    function atualizarLogVotos() {
        const log = document.getElementById('voteLogList'); log.innerHTML = "";
        for (let o in votes) votes[o].forEach(v => {
            const li = document.createElement('li');
            li.innerHTML = `${v} ➔ ${o} <button class="edit-btn" onclick="corrigirVoto('${v}','${o}')">✏️</button>`;
            log.appendChild(li);
        });
    }

    function corrigirVoto(v, o) {
        votes[o] = votes[o].filter(x => x !== v);
        atualizarLogVotos(); verificarEstadoVotacao();
    }

    function avancarParaProximoEleitor() {
        const voters = playerNames.filter(n => n !== storyteller);
        const voted = Object.values(votes).flat();
        const next = voters.find(v => !voted.includes(v));
        if (next) { document.getElementById('voterSelect').value = next; atualizarOpcoesCartas(); }
    }

    function finalizarRodada() {
        const sVotes = votes[storyteller] ? votes[storyteller].length : 0;
        if (sVotes === 0 || sVotes === playerNames.length - 1) {
            playerNames.forEach(n => { if (n !== storyteller) players[n] += 2; });
        } else {
            players[storyteller] += (3 + sVotes);
            votes[storyteller]?.forEach(v => players[v] += 3);
        }
        for (let o in votes) if (o !== storyteller) players[o] += votes[o].length;
        
        let max = Math.max(...Object.values(players));
        max >= winningScoreTarget ? mostrarVencedor() : mostrarPlacar();
    }

    function mostrarPlacar() {
        esconderTodasTelas();
        const list = document.getElementById('currentScoresList'); list.innerHTML = "";
        Object.entries(players).sort((a,b) => b[1]-a[1]).forEach(([n, s]) => list.innerHTML += `<li>${n} <strong>${s} pts</strong></li>`);
        document.getElementById('roundResultsCard').style.display = "block";
    }

    function proximaRodada() {
        roundNumber++; storytellerIndex = (storytellerIndex + 1) % playOrder.length; mostrarTelaNarrador();
    }

    function mostrarVencedor() {
        esconderTodasTelas();
        const sorted = Object.entries(players).sort((a,b) => b[1]-a[1]);
        const win = sorted[0][0];
        document.getElementById('winnerDisplay').innerHTML = `🏆<br><div id="winnerText" class="fit-container">${win} VENCEU!</div>`;
        const list = document.getElementById('finalScoresList'); list.innerHTML = "";
        sorted.forEach(([n, s]) => list.innerHTML += `<li>${n} <strong>${s} pts</strong></li>`);
        document.getElementById('finalResultsCard').style.display = "block";
        
        // Efeitos
        if(typeof confetti === "function") confetti({ particleCount: 150, spread: 70 });
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 600; osc.start(); osc.stop(0.5);
        
        setTimeout(() => ajustarNome('winnerText'), 50);
    }

    function esconderTodasTelas() {
        ['registrationCard', 'roundIntroCard', 'votingCard', 'roundResultsCard', 'finalResultsCard'].forEach(id => document.getElementById(id).style.display = "none");
    }
</script>
</body>
</html>
